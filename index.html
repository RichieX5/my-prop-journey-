<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>My Prop Journey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F0F4FF;--white:#fff;--card2:#F7F9FF;--border:#E2E8F8;--border2:#C8D4F0;
  --navy:#0F172A;--text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --purple:#5B4FE9;--purplebg:#EEF0FF;--green:#059669;--greenbg:#ECFDF5;
  --red:#DC2626;--redbg:#FEF2F2;--amber:#D97706;--amberbg:#FFFBEB;--blue:#0284C7;
  --font:'Plus Jakarta Sans',sans-serif;--display:'Syne',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:62px;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);position:relative;}
.page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;box-shadow:0 -4px 16px rgba(91,79,233,0.08);}
.nbt{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;position:relative;}
.nbt .ni{font-size:19px;line-height:1;}.nbt .nl{font-size:9px;font-weight:700;color:var(--text3);font-family:var(--font);}
.nbt.on .nl{color:var(--purple);}
.nbt.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--purple);border-radius:0 0 4px 4px;}

/* PAGE HDR */
.ph{padding:calc(var(--safe-top) + 13px) 16px 13px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:1.5px solid var(--border);box-shadow:0 2px 8px rgba(91,79,233,0.07);position:sticky;top:0;z-index:40;}
.ph h1{font-family:var(--display);font-size:20px;font-weight:900;color:var(--navy);}
.ph .sub{font-size:10px;color:var(--text3);margin-top:2px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;font-family:var(--font);font-weight:700;font-size:14px;padding:13px 22px;cursor:pointer;transition:all .15s;width:100%;}
.btn:active{transform:scale(0.97);}:disabled{opacity:.55;cursor:not-allowed;}
.btn-p{background:linear-gradient(135deg,#5B4FE9,#818CF8);color:#fff;box-shadow:0 4px 14px rgba(91,79,233,0.3);}
.btn-g{background:linear-gradient(135deg,#059669,#10B981);color:#fff;box-shadow:0 4px 14px rgba(5,150,105,0.25);}
.btn-ghost{background:var(--card2);border:1.5px solid var(--border2);color:var(--text2);}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;}
.add-btn{background:linear-gradient(135deg,#5B4FE9,#818CF8);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:11px;font-weight:700;padding:9px 14px;cursor:pointer;box-shadow:0 4px 12px rgba(91,79,233,0.3);}
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 14px);right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#5B4FE9,#818CF8);border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(91,79,233,0.4);z-index:90;cursor:pointer;transition:transform .18s;}
.fab:active{transform:scale(0.93);}

/* FORM */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.fi{width:100%;background:#fff;border:2px solid var(--border2);border-radius:14px;color:var(--navy);font-family:var(--font);font-size:14px;font-weight:600;padding:12px 13px;outline:none;-webkit-appearance:none;transition:border-color .18s;}
.fi:focus{border-color:var(--purple);}
.fi::placeholder{color:var(--text3);font-weight:500;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:10px;font-size:9px;font-weight:800;white-space:nowrap;}
.b-f{background:var(--greenbg);color:var(--green);border:1.5px solid #6EE7B7;}
.b-c{background:var(--purplebg);color:var(--purple);border:1.5px solid #C4BFFF;}
.b-b{background:var(--redbg);color:var(--red);border:1.5px solid #FCA5A5;}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);animation:fadeIn .2s ease;}
.mbox{background:#fff;width:100%;max-height:94vh;border-radius:24px 24px 0 0;overflow-y:auto;padding-bottom:calc(var(--safe-bottom) + 20px);animation:slideUp .3s cubic-bezier(.32,.72,0,1);}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 2px;}
.mhdr{padding:8px 20px 16px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.mtitle{font-family:var(--display);font-size:18px;font-weight:900;color:var(--navy);}
.mclose{width:28px;height:28px;border-radius:8px;background:var(--card2);border:1.5px solid var(--border2);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.mbody{padding:18px 20px;}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 14px);left:50%;transform:translateX(-50%) translateY(-12px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.s{background:var(--green);}.toast.e{background:var(--red);}

/* STEP DOTS */
.sdots{display:flex;gap:6px;margin-top:8px;}
.sdot{height:4px;flex:1;border-radius:2px;background:var(--border2);}
.sdot.on{background:var(--purple);}.sdot.done{background:var(--green);}

/* SIZE BTNS */
.szgrid{display:flex;gap:7px;flex-wrap:wrap;}
.szbtn{padding:8px 13px;border-radius:9px;border:2px solid var(--border2);background:#fff;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.szbtn.on{border-color:var(--purple);background:var(--purplebg);color:var(--purple);}

/* FILTERS */
.frow{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.fpill{flex-shrink:0;border:1.5px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;color:var(--text3);background:#fff;cursor:pointer;white-space:nowrap;}
.fpill.on{border-color:var(--purple);color:var(--purple);background:var(--purplebg);}

/* HSCROLL */
.hscroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.hscroll::-webkit-scrollbar{display:none;}

/* SECTION HDR */
.shdr{display:flex;justify-content:space-between;align-items:center;padding:13px 16px 7px;}
.shdr .st{font-size:13px;font-weight:800;color:var(--navy);}
.shdr .sl{font-size:11px;font-weight:700;color:var(--purple);cursor:pointer;background:none;border:none;}

/* RULE ROW */
.rrow{display:flex;align-items:center;gap:9px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:7px;}
.rrow:last-child{margin-bottom:0;}
.ri2{font-size:14px;flex-shrink:0;width:22px;text-align:center;}
.rb2{flex:1;min-width:0;}.rn{font-size:10px;font-weight:700;color:var(--navy);margin-bottom:1px;}.rv{font-size:9px;color:var(--text2);}
.rdot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.dok{background:var(--greenbg);color:var(--green);border:1.5px solid #6EE7B7;}
.dwarn{background:var(--amberbg);color:var(--amber);border:1.5px solid #FCD34D;}
.dbad{background:var(--redbg);color:var(--red);border:1.5px solid #FCA5A5;}

/* INSIGHT */
.ins{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;border-left:4px solid;margin-bottom:8px;}
.ins p{font-size:11px;font-weight:600;line-height:1.5;}
.ig{background:var(--greenbg);border-color:#6EE7B7;}.ig p{color:var(--green);}
.iw{background:var(--amberbg);border-color:#FCD34D;}.iw p{color:var(--amber);}
.ii{background:var(--purplebg);border-color:#C4BFFF;}.ii p{color:var(--purple);}

/* PROG */
.ptrack{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,#5B4FE9,#059669);transition:width .8s ease;}

/* GROUP LABEL */
.glbl{padding:9px 16px 5px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}

/* EMPTY */
.empty{text-align:center;padding:52px 24px;}
.empty .ei{font-size:52px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.empty p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;}

/* SPINNER */
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;}
.spind{border-color:rgba(91,79,233,0.3);border-top-color:var(--purple);}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
// ── SUPABASE ─────────────────────────────────────────────────────
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const sb = createClient(
  'https://hqkersneaenyutrxsilj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxa2Vyc25lYWVueXV0cnhzaWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDI2NjAsImV4cCI6MjA5MTMxODY2MH0.LMXgzHZj94bJpadBGxmcTP66ovc_uCHMY1LZrNxJjJk'
)

// ── CONSTANTS ────────────────────────────────────────────────────
const FIRMS = ['FTMO','Alpha Capital','Funding Pips','GOAT Funded Trader','Blueberry Funded','Lark Funding','Ment Funding','Aqua Funded','Funded Elite','The 5%ers','FundedNext','True Forex Funds','E8 Funding','Apex Trader Funding','Topstep','Hola Prime','My Funded FX','Nordic Funder','Blue Guardian','City Traders Imperium','Other (Custom)']
const SIZES = [{l:'$5K',v:5000},{l:'$10K',v:10000},{l:'$25K',v:25000},{l:'$50K',v:50000},{l:'$100K',v:100000},{l:'$200K',v:200000},{l:'Custom',v:'c'}]
const STATUSES = ['Challenge','Funded','Breached']
const SM = {Funded:{c:'#059669',bg:'#ECFDF5',bc:'#6EE7B7',e:'✅'},Challenge:{c:'#5B4FE9',bg:'#EEF0FF',bc:'#C4BFFF',e:'⏳'},Breached:{c:'#DC2626',bg:'#FEF2F2',bc:'#FCA5A5',e:'❌'}}
const RTPL = [{n:'Daily Drawdown',i:'📉',p:'e.g. Max 5% per day'},{n:'Max Drawdown',i:'📊',p:'e.g. Max 10% (static)'},{n:'Profit Target',i:'🎯',p:'e.g. 10% Phase 1, 5% Phase 2'},{n:'Min Trading Days',i:'📅',p:'e.g. Minimum 5 days'},{n:'News Trading',i:'📰',p:'e.g. Restricted 2min buffer'},{n:'Weekend Holding',i:'🕐',p:'e.g. Not allowed'},{n:'Consistency Rule',i:'🔄',p:'e.g. No day > 40% profit'},{n:'EA / Bots',i:'🤖',p:'e.g. Allowed, own strategy only'}]

// ── STATE ────────────────────────────────────────────────────────
let S = {session:null,profile:null,accounts:[],goals:[],milestones:[],tab:'dash',loading:true,modal:null}

const fmt = v => {if(!v&&v!==0)return'$0';const n=Number(v);if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(1)}K`;return`$${n.toLocaleString()}`}
const fmtD = d => {if(!d)return'—';const p=d.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${mo[parseInt(p[1])-1]} ${p[2]}, ${p[0]}`}

function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=(type==='s'?'✓ ':type==='e'?'✕ ':'')+msg;t.className='toast show '+(type||'');setTimeout(()=>t.className='toast',2800);}

// ── SUPABASE HELPERS ─────────────────────────────────────────────
async function loadData(){
  if(!S.session)return
  const uid=S.session.user.id
  try{
    const [p,a,g,m]=await Promise.all([
      sb.from('profiles').select('*').eq('id',uid).single(),
      sb.from('accounts').select('*,rules(*),payouts(*)').eq('user_id',uid).order('created_at',{ascending:false}),
      sb.from('goals').select('*').eq('user_id',uid),
      sb.from('milestones').select('*').eq('user_id',uid).order('created_at')
    ])
    if(p.data)S.profile=p.data
    if(a.data)S.accounts=a.data
    if(g.data)S.goals=g.data
    if(m.data)S.milestones=m.data
  }catch(e){console.error(e)}
  S.loading=false;render()
}

// ── STATS ────────────────────────────────────────────────────────
function stats(){
  const accs=S.accounts
  const funded=accs.filter(a=>a.status==='Funded')
  const challenge=accs.filter(a=>a.status==='Challenge')
  const breached=accs.filter(a=>a.status==='Breached')
  const totalFunding=funded.reduce((s,a)=>s+(a.size_value||0),0)
  const totalInv=accs.reduce((s,a)=>s+(a.investment||0),0)
  const totalPay=accs.reduce((s,a)=>s+(a.payouts||[]).reduce((ps,p)=>ps+(p.amount||0),0),0)
  const netProfit=totalPay-totalInv
  const mainGoal=S.goals.find(g=>g.is_main)||{target:150000}
  const goalPct=Math.min((totalPay/mainGoal.target)*100,100)
  const allPay=accs.flatMap(a=>(a.payouts||[]).map(p=>({...p,firm:a.firm}))).sort((a,b)=>(b.date||'').localeCompare(a.date||''))
  const mo={};allPay.forEach(p=>{if(!p.date)return;const k=p.date.slice(0,7);mo[k]=(mo[k]||0)+p.amount})
  const monthly=Object.entries(mo).sort().slice(-8).map(([k,v])=>({k,v}))
  const fp={};accs.forEach(a=>{const pay=(a.payouts||[]).reduce((s,p)=>s+(p.amount||0),0);fp[a.firm]=(fp[a.firm]||0)+pay})
  const lb=Object.entries(fp).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,5)
  // perf
  let perf=null
  if(accs.length){
    const tot=accs.length,fc=funded.length,bc=breached.length
    const wr=fc/tot,roi=totalInv>0?(totalPay-totalInv)/totalInv:0,br=bc/tot
    const div=Math.min(new Set(accs.map(a=>a.firm)).size*20,100)
    const ws=Math.round(wr*100),rs=Math.min(Math.round(Math.max(roi,0)*150),100)
    const brs=Math.round(Math.max(0,1-br)*100),ps=Math.min(Math.round((totalPay/(mainGoal.target||150000))*100),100)
    const ov=Math.round((ws+rs+brs+div+ps)/5)
    const grades=[{min:90,g:'S',l:'Elite Trader'},{min:75,g:'A',l:'Strong Trader'},{min:60,g:'B',l:'Good Progress'},{min:45,g:'C',l:'Developing'},{min:0,g:'D',l:'Needs Work'}]
    const gd=grades.find(x=>ov>=x.min)||grades[4]
    perf={ws,rs,brs,div,ps,ov,g:gd.g,l:gd.l,wr,roi,br}
  }
  return{accs,funded,challenge,breached,totalFunding,totalInv,totalPay,netProfit,mainGoal,goalPct,allPay,monthly,lb,perf,breachRate:accs.length?Math.round(breached.length/accs.length*100):0}
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app')
  if(!S.session){app.innerHTML=renderAuth();bindAuth();return}
  if(S.loading){app.innerHTML=`<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px"><div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#5B4FE9,#818CF8);display:flex;align-items:center;justify-content:center;font-size:26px">📈</div><div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:#0F172A">My Prop Journey</div><div class="spin spind"></div></div>`;return}
  const st=stats()
  let page=''
  if(S.tab==='dash')page=renderDash(st)
  else if(S.tab==='accs')page=renderAccs(st)
  else if(S.tab==='add')page=renderAdd()
  else if(S.tab==='pays')page=renderPays(st)
  else if(S.tab==='perf')page=renderPerf(st)
  else if(S.tab==='goals')page=renderGoals(st)

  app.innerHTML=`
    <div class="page fu">${page}</div>
    ${S.tab!=='add'?`<nav class="bnav">
      <button class="nbt${S.tab==='dash'?' on':''}" onclick="setTab('dash')"><span class="ni">🏠</span><span class="nl">Home</span></button>
      <button class="nbt${S.tab==='accs'?' on':''}" onclick="setTab('accs')"><span class="ni">📋</span><span class="nl">Accounts</span></button>
      <button class="nbt${S.tab==='add'?' on':''}" onclick="setTab('add')"><span class="ni">➕</span><span class="nl">Add</span></button>
      <button class="nbt${S.tab==='pays'?' on':''}" onclick="setTab('pays')"><span class="ni">💰</span><span class="nl">Payouts</span></button>
      <button class="nbt${S.tab==='goals'?' on':''}" onclick="setTab('goals')"><span class="ni">🎯</span><span class="nl">Goals</span></button>
    </nav>`:''}
    ${S.modal?renderModal():''}
  `
  bindPage()
}

window.setTab=t=>{S.tab=t;S.addStep=1;render()}

// ── AUTH ──────────────────────────────────────────────────────────
function renderAuth(){
  const isLogin=S.authMode!=='register'
  return`<div style="min-height:100vh;overflow:auto;background:var(--bg);padding:0 24px">
    <div style="text-align:center;padding:52px 0 24px">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#5B4FE9,#818CF8);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;box-shadow:0 4px 14px rgba(91,79,233,0.3)">📈</div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:900;color:#0F172A;margin-bottom:4px">My Prop Journey</div>
      <div style="font-size:13px;color:#94A3B8">${isLogin?'Log in to your account':'Create your free account'}</div>
    </div>
    <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:900;color:#0F172A;margin-bottom:20px">${isLogin?'Welcome back':'Start your journey'}</h2>
    ${!isLogin?`<div class="fg"><label class="fl">Full Name</label><input class="fi" id="auth-name" type="text" placeholder="Your name" autocomplete="name"/></div>`:''}
    <div class="fg"><label class="fl">Email</label><input class="fi" id="auth-email" type="email" placeholder="you@email.com" autocomplete="email"/></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="auth-pass" type="password" placeholder="${isLogin?'••••••••':'Min. 6 characters'}" autocomplete="${isLogin?'current-password':'new-password'}"/></div>
    <div id="auth-err" style="font-size:11px;color:var(--red);font-weight:600;margin-bottom:12px;text-align:center;display:none"></div>
    ${!isLogin?`<div style="background:var(--purplebg);border:1.5px solid #C4BFFF;border-radius:10px;padding:12px;margin-bottom:14px;font-size:11px;color:#5B4FE9;line-height:1.6">✓ Free forever · Track unlimited accounts · No credit card</div>`:''}
    <button class="btn btn-p" id="auth-btn" style="margin-bottom:14px">${isLogin?'Log In':'Create Free Account'}</button>
    <p style="text-align:center;font-size:13px;color:#94A3B8;padding-bottom:32px">
      ${isLogin?`No account? <a href="#" id="auth-switch" style="color:#5B4FE9;font-weight:700">Sign up free</a>`:`Have an account? <a href="#" id="auth-switch" style="color:#5B4FE9;font-weight:700">Log in</a>`}
    </p>
  </div>`
}

function bindAuth(){
  document.getElementById('auth-switch')?.addEventListener('click',e=>{e.preventDefault();S.authMode=S.authMode==='register'?'login':'register';render()})
  document.getElementById('auth-btn')?.addEventListener('click',async()=>{
    const email=document.getElementById('auth-email')?.value?.trim()
    const pass=document.getElementById('auth-pass')?.value
    const name=document.getElementById('auth-name')?.value?.trim()
    const errEl=document.getElementById('auth-err')
    const btn=document.getElementById('auth-btn')
    if(!email||!pass){errEl.textContent='Please fill in all fields';errEl.style.display='block';return}
    if(S.authMode==='register'&&pass.length<6){errEl.textContent='Password must be at least 6 characters';errEl.style.display='block';return}
    btn.innerHTML='<div class="spin"></div>';btn.disabled=true
    if(S.authMode==='register'){
      const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}})
      if(error){errEl.textContent=error.message;errEl.style.display='block';btn.innerHTML='Create Free Account';btn.disabled=false}
      else{toast('Account created! Check your email ✓','s');S.authMode='login';render()}
    }else{
      const{error}=await sb.auth.signInWithPassword({email,password:pass})
      if(error){errEl.textContent=error.message;errEl.style.display='block';btn.innerHTML='Log In';btn.disabled=false}
      else toast('Welcome back! 👋','s')
    }
  })
}

window.goAdd2=()=>{
  const fn=addData.firm==='Other (Custom)'?addData.customFirm.trim():addData.firm

window.saveAcc=async()=>{
  const btn=document.getElementById('save-acc-btn')
  if(btn){btn.innerHTML='<div class="spin"></div>';btn.disabled=true}
  const fn=addData.firm==='Other (Custom)'?addData.customFirm.trim():addData.firm
  const finalSz=addData.isCustomSz?parseFloat(addData.customSz)||0:addData.sizeV
  const finalLbl=addData.isCustomSz?`$${Number(finalSz).toLocaleString()}`:addData.sizeL
  try{
    const{data:acc,error}=await sb.from('accounts').insert([{user_id:S.session.user.id,firm:fn,size_value:finalSz,size_label:finalLbl,status:addData.status,investment:parseFloat(addData.inv)||0,notes:addData.notes.trim()}]).select().single()
    if(error)throw error
    const allRules=[...addRules.filter(r=>r.on&&r.v.trim()),...addCustomRules.filter(r=>r.name.trim()&&r.val.trim())]
    for(const r of allRules){
      await sb.from('rules').insert([{account_id:acc.id,user_id:S.session.user.id,rule_name:r.n||r.name,rule_value:r.v||r.val,status:'ok'}])
    }
    toast('Account added ✓','s')
    addData={firm:FIRMS[0],customFirm:'',sizeV:10000,sizeL:'$10K',isCustomSz:false,customSz:'',status:'Challenge',inv:'',notes:''}
    addRules=RTPL.map(t=>({...t,v:'',on:true}));addCustomRules=[];addStep=1
    await loadData();S.tab='accs'
  }catch(e){toast(e.message||'Error saving','e');if(btn){btn.innerHTML='✅ Save Account';btn.disabled=false}}
}

    <div style="height:10px;background:rgba(255,255,255,0.18);border-radius:5px;overflow:hidden;margin-bottom:6px"><div style="height:100%;width:${goalPct}%;background:linear-gradient(90deg,#A5F3D4,#6EE7B7);border-radius:5px;transition:width .8s ease"></div></div>
    <div style="display:flex;justify-content:space-between">
      ${['$0',fmt((mainGoal.target||150000)*.25),fmt((mainGoal.target||150000)*.5),fmt((mainGoal.target||150000)*.75),fmt(mainGoal.target||150000)].map(l=>`<span style="font-size:8px;color:rgba(255,255,255,0.45)">${l}</span>`).join('')}
    </div>
    <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px;font-size:11px;color:#fff;font-weight:700;margin-top:11px;text-align:center">
      ${goalPct>=100?'🎉 Goal reached! Set a new one.':goalPct>=75?`🔥 Almost there! ${fmt(Math.max((mainGoal.target||150000)-totalPay,0))} to go`:goalPct>=50?`🚀 Over halfway! ${fmt(Math.max((mainGoal.target||150000)-totalPay,0))} remaining`:`💪 Keep going! ${fmt(Math.max((mainGoal.target||150000)-totalPay,0))} remaining`}
    </div>
  </div>
  <div style="padding:14px 16px 8px;font-size:12px;font-weight:800;color:#0F172A">Milestones</div>
  ${ms.length===0?`<div style="margin:0 16px;background:#fff;border:2px dashed #C4BFFF;border-radius:16px;padding:20px;text-align:center"><div style="font-size:28px;margin-bottom:8px">🎯</div><div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:4px">No milestones yet</div><div style="font-size:11px;color:#94A3B8">Tap + Milestone to add targets</div></div>`:''}
  ${ms.map((m,i)=>{const pct=m.target_value>0?Math.min((m.current_value/m.target_value)*100,100):0;const c=COLS[i%COLS.length];return`
  <div style="margin:0 16px 9px;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:13px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.05)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:13px;font-weight:800;color:#0F172A">${m.label}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;font-weight:800;color:${c}">${m.unit}${Number(m.current_value||0).toLocaleString()} / ${m.unit}${Number(m.target_value||0).toLocaleString()}</span>
        <button onclick="delMS('${m.id}')" style="background:none;border:none;color:#FCA5A5;font-size:14px;cursor:pointer;padding:2px">✕</button>
      </div>
    </div>
    <div style="height:7px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${c};border-radius:4px;transition:width .8s ease"></div></div>
    <div style="font-size:10px;color:#94A3B8;margin-top:4px">${Math.round(pct)}% complete</div>
  </div>`}).join('')}
  <div style="height:16px"></div>
  ${S.modal?renderModal():''}`
}

window.saveGoal=async()=>{
  const t=parseFloat(document.getElementById('g-target')?.value)||150000
  const mg=S.goals.find(g=>g.is_main)
  if(mg){await sb.from('goals').update({target:t}).eq('id',mg.id)}
  else{await sb.from('goals').insert([{user_id:S.session.user.id,label:'Main Payout Goal',target:t,is_main:true}])}
  toast('Goal updated ✓','s');S.modal=null;await loadData()
}

window.saveMilestone=async()=>{
  const label=document.getElementById('ms-label')?.value?.trim()
  if(!label){toast('Enter a milestone name','e');return}
  const unit=document.getElementById('ms-unit')?.value||''
  const target=parseFloat(document.getElementById('ms-target')?.value)||0
  const current=parseFloat(document.getElementById('ms-current')?.value)||0
  await sb.from('milestones').insert([{user_id:S.session.user.id,label,unit,target_value:target,current_value:current}])
  toast('Milestone added ✓','s');S.modal=null;await loadData()
}

window.delMS=async id=>{if(!confirm('Delete this milestone?'))return;await sb.from('milestones').delete().eq('id',id);toast('Removed','s');await loadData()}

// ── BIND PAGE ─────────────────────────────────────────────────────
function bindPage(){
  // Sign out button if needed
  const so=document.getElementById('signout-btn')
  if(so)so.addEventListener('click',async()=>{await sb.auth.signOut();toast('Signed out','s')})
}

// ── INIT ──────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async(_,session)=>{
  S.session=session
  if(session){S.loading=true;render();await loadData()}
  else{S.loading=false;render()}
})

sb.auth.getSession().then(({data:{session}})=>{
  S.session=session
  if(session){S.loading=true;render();loadData()}
  else{S.loading=false;render()}
})
</script>
</body>
</html>
