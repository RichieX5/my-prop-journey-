<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#5B4FE9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Prop Journey"/>
<meta name="description" content="Track all your prop firm accounts in one dashboard."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Syne:wght@800;900&display=swap" rel="stylesheet"/>
<title>My Prop Journey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F0F4FF;--white:#fff;--c2:#F7F9FF;--bdr:#E2E8F8;--bdr2:#C8D4F0;
  --navy:#0F172A;--t2:#475569;--t3:#94A3B8;
  --pu:#5B4FE9;--pubg:#EEF0FF;--gr:#059669;--grbg:#ECFDF5;
  --rd:#DC2626;--rdbg:#FEF2F2;--am:#D97706;--ambg:#FFFBEB;
  --font:'Plus Jakarta Sans',sans-serif;--disp:'Syne',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --nh:62px;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--navy);-webkit-font-smoothing:antialiased;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);}
.page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nh) + var(--sb) + 8px);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid var(--bdr);display:flex;padding-bottom:var(--sb);z-index:100;box-shadow:0 -4px 16px rgba(91,79,233,.08);}
.nbt{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;position:relative;}
.nbt .ni{font-size:19px;line-height:1;}.nbt .nl{font-size:9px;font-weight:700;color:var(--t3);font-family:var(--font);}
.nbt.on .nl{color:var(--pu);}
.nbt.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--pu);border-radius:0 0 4px 4px;}

/* PAGE HDR */
.ph{padding:calc(var(--st) + 13px) 16px 13px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:1.5px solid var(--bdr);box-shadow:0 2px 8px rgba(91,79,233,.07);position:sticky;top:0;z-index:40;}
.ph h1{font-family:var(--disp);font-size:20px;font-weight:900;}
.ph .sub{font-size:10px;color:var(--t3);margin-top:2px;}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;font-family:var(--font);font-weight:700;font-size:14px;padding:13px 22px;cursor:pointer;transition:transform .15s;width:100%;}
.btn:active{transform:scale(.97);}
.btn-p{background:linear-gradient(135deg,#5B4FE9,#818CF8);color:#fff;box-shadow:0 4px 14px rgba(91,79,233,.3);}
.btn-g{background:linear-gradient(135deg,#059669,#10B981);color:#fff;box-shadow:0 4px 14px rgba(5,150,105,.25);}
.btn-ghost{background:var(--c2);border:1.5px solid var(--bdr2);color:var(--t2);}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;}
.addbtn{background:linear-gradient(135deg,#5B4FE9,#818CF8);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:11px;font-weight:700;padding:9px 14px;cursor:pointer;box-shadow:0 4px 12px rgba(91,79,233,.3);}
.fab{position:fixed;bottom:calc(var(--nh) + var(--sb) + 14px);right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#5B4FE9,#818CF8);border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(91,79,233,.4);z-index:90;cursor:pointer;}
.fab:active{transform:scale(.93);}

/* FORM */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.fi{width:100%;background:#fff;border:2px solid var(--bdr2);border-radius:14px;color:var(--navy);font-family:var(--font);font-size:14px;font-weight:600;padding:12px 13px;outline:none;-webkit-appearance:none;transition:border-color .18s;}
.fi:focus{border-color:var(--pu);}
.fi::placeholder{color:var(--t3);font-weight:500;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* SIZE BTNS */
.szg{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.szb{padding:8px 13px;border-radius:9px;border:2px solid var(--bdr2);background:#fff;color:var(--t2);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;}
.szb.on{border-color:var(--pu);background:var(--pubg);color:var(--pu);}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:10px;font-size:9px;font-weight:800;}
.bf{background:var(--grbg);color:var(--gr);border:1.5px solid #6EE7B7;}
.bc{background:var(--pubg);color:var(--pu);border:1.5px solid #C4BFFF;}
.bb{background:var(--rdbg);color:var(--rd);border:1.5px solid #FCA5A5;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.mbox{background:#fff;width:100%;max-height:92vh;border-radius:24px 24px 0 0;overflow-y:auto;padding-bottom:calc(var(--sb) + 20px);animation:slideUp .3s cubic-bezier(.32,.72,0,1);}
.mh{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:12px auto 2px;}
.mhdr{padding:8px 20px 16px;border-bottom:1.5px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;}
.mtitle{font-family:var(--disp);font-size:18px;font-weight:900;}
.mclose{width:28px;height:28px;border-radius:8px;background:var(--c2);border:1.5px solid var(--bdr2);color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.mbody{padding:18px 20px;}

/* TOAST */
.toast{position:fixed;top:calc(var(--st) + 14px);left:50%;transform:translateX(-50%) translateY(-12px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ts{background:var(--gr);}.te{background:var(--rd);}

/* DOTS */
.sdots{display:flex;gap:6px;margin-top:8px;}
.sd{height:4px;flex:1;border-radius:2px;background:var(--bdr2);}
.sd.on{background:var(--pu);}.sd.done{background:var(--gr);}

/* FILTERS */
.frow2{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;}
.frow2::-webkit-scrollbar{display:none;}
.fpill{flex-shrink:0;border:1.5px solid var(--bdr2);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;color:var(--t3);background:#fff;cursor:pointer;}
.fpill.on{border-color:var(--pu);color:var(--pu);background:var(--pubg);}

/* HSCROLL */
.hs{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;}
.hs::-webkit-scrollbar{display:none;}

/* SECTION HDR */
.shdr{display:flex;justify-content:space-between;align-items:center;padding:13px 16px 7px;}
.shdr .st{font-size:13px;font-weight:800;}
.shdr .sl{font-size:11px;font-weight:700;color:var(--pu);background:none;border:none;cursor:pointer;}

/* RULE ROW */
.rr{display:flex;align-items:center;gap:9px;background:var(--c2);border:1.5px solid var(--bdr);border-radius:10px;padding:9px 11px;margin-bottom:7px;}
.ri{font-size:14px;flex-shrink:0;width:22px;text-align:center;}
.rb{flex:1;min-width:0;}.rn{font-size:10px;font-weight:700;margin-bottom:1px;}.rv{font-size:9px;color:var(--t2);}

/* INSIGHT */
.ins{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;border-left:4px solid;margin-bottom:8px;}
.ins p{font-size:11px;font-weight:600;line-height:1.5;}
.ig{background:var(--grbg);border-color:#6EE7B7;}.ig p{color:var(--gr);}
.iw{background:var(--ambg);border-color:#FCD34D;}.iw p{color:var(--am);}
.ii{background:var(--pubg);border-color:#C4BFFF;}.ii p{color:var(--pu);}

/* GROUP LBL */
.glbl{padding:9px 16px 5px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}

/* EMPTY */
.empty{text-align:center;padding:52px 24px;}
.ei{font-size:52px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:20px;}

/* SPIN */
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;}
.spd{border-color:rgba(91,79,233,.3);border-top-color:var(--pu);}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fu{animation:fu .3s ease both;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app"></div>
<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const sb=createClient(
  'https://hqkersneaenyutrxsilj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxa2Vyc25lYWVueXV0cnhzaWxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDI2NjAsImV4cCI6MjA5MTMxODY2MH0.LMXgzHZj94bJpadBGxmcTP66ovc_uCHMY1LZrNxJjJk'
)

// ── CONSTANTS ──────────────────────────────────────────────────
const FIRMS=['FTMO','Alpha Capital','Funding Pips','GOAT Funded Trader','Blueberry Funded','Lark Funding','Ment Funding','Aqua Funded','Funded Elite','The 5%ers','FundedNext','True Forex Funds','E8 Funding','Apex Trader Funding','Topstep','Hola Prime','My Funded FX','Nordic Funder','Blue Guardian','City Traders Imperium','Other (type name below)']
const SIZES=[{l:'$5K',v:5000},{l:'$10K',v:10000},{l:'$25K',v:25000},{l:'$50K',v:50000},{l:'$100K',v:100000},{l:'$200K',v:200000},{l:'Custom',v:0}]
const SM={Funded:{c:'#059669',bg:'#ECFDF5',bc:'#6EE7B7',e:'✅'},Challenge:{c:'#5B4FE9',bg:'#EEF0FF',bc:'#C4BFFF',e:'⏳'},Breached:{c:'#DC2626',bg:'#FEF2F2',bc:'#FCA5A5',e:'❌'}}
const RTPL=[{n:'Daily Drawdown',i:'📉',p:'e.g. Max 5% per day'},{n:'Max Drawdown',i:'📊',p:'e.g. Max 10% static'},{n:'Profit Target',i:'🎯',p:'e.g. 10% Phase 1'},{n:'Min Trading Days',i:'📅',p:'e.g. Minimum 5 days'},{n:'News Trading',i:'📰',p:'e.g. Restricted 2min buffer'},{n:'Weekend Holding',i:'🕐',p:'e.g. Not allowed'},{n:'Consistency Rule',i:'🔄',p:'e.g. No day > 40% profit'},{n:'EA / Bots',i:'🤖',p:'e.g. Allowed, own strategy'}]

// ── STATE ──────────────────────────────────────────────────────
const APP={
  session:null, profile:null, accounts:[], goals:[], milestones:[],
  tab:'dash', loading:true, modal:null, authMode:'register',
  // add account form — persistent across steps
  form:{firm:FIRMS[0],customFirm:'',sizeV:10000,sizeL:'$10K',isCustom:false,customSz:'',status:'Challenge',inv:'',notes:'',step:1},
  rules:RTPL.map(r=>({...r,v:'',on:true})),
  customRules:[],
  // other modal state
  payAccId:null, accFilter:'All', expanded:new Set()
}

// ── HELPERS ────────────────────────────────────────────────────
const fmt=v=>{if(!v&&v!==0)return'$0';const n=Number(v);if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(1)}K`;return`$${n.toLocaleString()}`}
const fmtD=d=>{if(!d)return'—';const[y,m,day]=d.split('-');return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${day}, ${y}`}
const toast=(msg,t='')=>{const el=document.getElementById('toast');el.textContent=(t==='s'?'✓ ':t==='e'?'✕ ':'')+msg;el.className=`toast show${t?' t'+t:''}`;setTimeout(()=>el.className='toast',2800)}
const $=id=>document.getElementById(id)

// ── DATA ───────────────────────────────────────────────────────
async function loadData(){
  if(!APP.session)return
  const uid=APP.session.user.id
  const[p,a,g,m]=await Promise.all([
    sb.from('profiles').select('*').eq('id',uid).single(),
    sb.from('accounts').select('*,rules(*),payouts(*)').eq('user_id',uid).order('created_at',{ascending:false}),
    sb.from('goals').select('*').eq('user_id',uid),
    sb.from('milestones').select('*').eq('user_id',uid).order('created_at')
  ])
  if(p.data)APP.profile=p.data
  if(a.data)APP.accounts=a.data
  if(g.data)APP.goals=g.data
  if(m.data)APP.milestones=m.data
  APP.loading=false
  render()
}

// ── STATS ──────────────────────────────────────────────────────
function stats(){
  const ac=APP.accounts
  const funded=ac.filter(a=>a.status==='Funded')
  const challenge=ac.filter(a=>a.status==='Challenge')
  const breached=ac.filter(a=>a.status==='Breached')
  const tFund=funded.reduce((s,a)=>s+(a.size_value||0),0)
  const tInv=ac.reduce((s,a)=>s+(a.investment||0),0)
  const tPay=ac.reduce((s,a)=>s+(a.payouts||[]).reduce((p,x)=>p+(x.amount||0),0),0)
  const mg=APP.goals.find(g=>g.is_main)||{target:150000}
  const gPct=Math.min((tPay/(mg.target||150000))*100,100)
  const allP=ac.flatMap(a=>(a.payouts||[]).map(p=>({...p,firm:a.firm}))).sort((a,b)=>(b.date||'').localeCompare(a.date||''))
  const mo={};allP.forEach(p=>{if(!p.date)return;const k=p.date.slice(0,7);mo[k]=(mo[k]||0)+p.amount})
  const monthly=Object.entries(mo).sort().slice(-8).map(([k,v])=>({k,v}))
  const fp={};ac.forEach(a=>{const pay=(a.payouts||[]).reduce((s,p)=>s+(p.amount||0),0);fp[a.firm]=(fp[a.firm]||0)+pay})
  const lb=Object.entries(fp).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,5)
  let perf=null
  if(ac.length){
    const tot=ac.length,fc=funded.length,bc=breached.length
    const wr=fc/tot,roi=tInv>0?(tPay-tInv)/tInv:0,br=bc/tot
    const div=Math.min(new Set(ac.map(a=>a.firm)).size*20,100)
    const ws=Math.round(wr*100),rs=Math.min(Math.round(Math.max(roi,0)*150),100)
    const brs=Math.round(Math.max(0,1-br)*100),ps=Math.min(Math.round((tPay/(mg.target||150000))*100),100)
    const ov=Math.round((ws+rs+brs+div+ps)/5)
    const gd=[{min:90,g:'S',l:'Elite Trader'},{min:75,g:'A',l:'Strong Trader'},{min:60,g:'B',l:'Good Progress'},{min:45,g:'C',l:'Developing'},{min:0,g:'D',l:'Needs Work'}].find(x=>ov>=x.min)||{g:'D',l:'Needs Work'}
    perf={ws,rs,brs,div,ps,ov,g:gd.g,l:gd.l,wr,roi,br}
  }
  return{ac,funded,challenge,breached,tFund,tInv,tPay,netP:tPay-tInv,mg,gPct,allP,monthly,lb,perf,bRate:ac.length?Math.round(breached.length/ac.length*100):0}
}

// ── RENDER ROOT ────────────────────────────────────────────────
function render(){
  const app=$('app')
  if(!APP.session){app.innerHTML=authHTML();bindAuth();return}
  if(APP.loading){app.innerHTML=loaderHTML();return}
  const st=stats()
  let body=''
  if(APP.tab==='dash')body=dashHTML(st)
  else if(APP.tab==='accs')body=accsHTML(st)
  else if(APP.tab==='add')body=addHTML()
  else if(APP.tab==='pays')body=paysHTML(st)
  else if(APP.tab==='perf')body=perfHTML(st)
  else if(APP.tab==='goals')body=goalsHTML(st)

  app.innerHTML=`
    <div class="page fu" id="pg">${body}</div>
    ${APP.tab!=='add'?navHTML():''}
    ${APP.modal?modalHTML():''}
  `
  bindAll()
}

const loaderHTML=()=>`<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px"><div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#5B4FE9,#818CF8);display:flex;align-items:center;justify-content:center;font-size:26px">📈</div><div style="font-family:var(--disp);font-size:20px;font-weight:900">My Prop Journey</div><div class="spin spd"></div></div>`

const navHTML=()=>`<nav class="bnav">
  ${[['dash','🏠','Home'],['accs','📋','Accounts'],['add','➕','Add'],['pays','💰','Payouts'],['goals','🎯','Goals']].map(([t,i,l])=>`<button class="nbt${APP.tab===t?' on':''}" id="nav-${t}"><span class="ni">${i}</span><span class="nl">${l}</span></button>`).join('')}
</nav>`

// ── AUTH ───────────────────────────────────────────────────────
const authHTML=()=>`<div style="min-height:100vh;overflow:auto;background:var(--bg);padding:0 24px">
  <div style="text-align:center;padding:52px 0 24px">
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#5B4FE9,#818CF8);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;box-shadow:0 4px 14px rgba(91,79,233,.3)">📈</div>
    <div style="font-family:var(--disp);font-size:22px;font-weight:900;margin-bottom:4px">My Prop Journey</div>
    <div style="font-size:13px;color:var(--t3)">${APP.authMode==='login'?'Log in to your account':'Create your free account'}</div>
  </div>
  <h2 style="font-family:var(--disp);font-size:22px;font-weight:900;margin-bottom:20px">${APP.authMode==='login'?'Welcome back':'Start your journey'}</h2>
  ${APP.authMode!=='login'?`<div class="fg"><label class="fl">Full Name</label><input class="fi" id="a-name" type="text" placeholder="Your name" autocomplete="name"/></div>`:''}
  <div class="fg"><label class="fl">Email</label><input class="fi" id="a-email" type="email" placeholder="you@email.com" autocomplete="email"/></div>
  <div class="fg"><label class="fl">Password</label><input class="fi" id="a-pass" type="password" placeholder="${APP.authMode==='login'?'••••••••':'Min. 6 characters'}" autocomplete="${APP.authMode==='login'?'current-password':'new-password'}"/></div>
  <div id="a-err" style="font-size:11px;color:var(--rd);font-weight:600;margin-bottom:12px;text-align:center;display:none"></div>
  ${APP.authMode!=='login'?`<div style="background:var(--pubg);border:1.5px solid #C4BFFF;border-radius:10px;padding:12px;margin-bottom:14px;font-size:11px;color:#5B4FE9;line-height:1.6">✓ Free forever · Track unlimited accounts · No credit card</div>`:''}
  <button class="btn btn-p" id="a-btn" style="margin-bottom:14px">${APP.authMode==='login'?'Log In':'Create Free Account'}</button>
  <p style="text-align:center;font-size:13px;color:var(--t3);padding-bottom:32px">
    ${APP.authMode==='login'?`No account? <a href="#" id="a-sw" style="color:var(--pu);font-weight:700">Sign up free</a>`:`Have an account? <a href="#" id="a-sw" style="color:var(--pu);font-weight:700">Log in</a>`}
  </p>
</div>`

function bindAuth(){
  $('a-sw')?.addEventListener('click',e=>{e.preventDefault();APP.authMode=APP.authMode==='login'?'register':'login';render()})
  $('a-btn')?.addEventListener('click',async()=>{
    const email=$('a-email')?.value?.trim()
    const pass=$('a-pass')?.value
    const name=$('a-name')?.value?.trim()
    const err=$('a-err'),btn=$('a-btn')
    if(!email||!pass){err.textContent='Please fill in all fields';err.style.display='block';return}
    if(APP.authMode!=='login'&&pass.length<6){err.textContent='Password needs at least 6 characters';err.style.display='block';return}
    btn.innerHTML='<div class="spin"></div>';btn.disabled=true
    if(APP.authMode!=='login'){
      const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name||''}}})
      if(error){err.textContent=error.message;err.style.display='block';btn.innerHTML='Create Free Account';btn.disabled=false}
      else{toast('Account created! Check your email to confirm.','s');APP.authMode='login';render()}
    }else{
      const{error}=await sb.auth.signInWithPassword({email,password:pass})
      if(error){err.textContent=error.message;err.style.display='block';btn.innerHTML='Log In';btn.disabled=false}
      else toast('Welcome back! 👋','s')
    }
  })
}

// ── DASHBOARD ─────────────────────────────────────────────────
